<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NES Collection Dashboard</title>
<script src="nes-games.js"></script>
<script src="asset-manifest.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111111;
  --surface: #1c1c1c;
  --surface2: #242424;
  --border: #2e2e2e;
  --ink: #f0ece8;
  --muted: #6b6b6b;
  --accent: #e60012;
  --accent2: #ff3333;
  --gold: #c8c8c8;
  --red: #e60012;
  --glow: rgba(230,0,18,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(230,0,18,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,0,18,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(230,0,18,0.07) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 1;
  padding: 48px 0 36px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(230,0,18,0.05) 0%, transparent 100%);
}

.header-inner {
  width: 100%;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,0,18,0.08);
  border: 1px solid rgba(230,0,18,0.3);
  border-radius: 4px;
  padding: 5px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.header-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(230,0,18,0.5);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

h1 {
  font-size: clamp(32px, 5vw, 58px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink);
}

h1 span { color: var(--accent); }

.tagline {
  color: var(--muted);
  font-size: 14px;
  margin-top: 10px;
  font-family: 'Space Mono', monospace;
}

.wrap {
  max-width: 1380px;
  margin: 0 auto;
  padding: 28px 28px;
  position: relative;
  z-index: 1;
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr 1fr 1fr;
  gap: 14px;
  margin: 28px 0;
  align-items: stretch;
}

.stats .stat {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

@media (max-width: 700px) {
  .stats {
    grid-template-columns: 1fr 1fr;
  }
  .stat.stat--hero {
    grid-column: 1 / -1;
  }
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 20px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.stat:hover {
  border-color: rgba(0,229,192,0.35);
  transform: translateY(-2px);
}

.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.stat.stat--hero {
  border-color: rgba(230,0,18,0.35);
  background: linear-gradient(135deg, rgba(230,0,18,0.08) 0%, var(--surface) 60%);
  box-shadow: 0 0 0 1px rgba(230,0,18,0.2), 0 0 40px rgba(230,0,18,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 28px 32px 24px;
}

.stat.stat--hero .stat-label {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 6px;
}

.stat.stat--hero .stat-value {
  font-size: clamp(13px, 3.5vw, 22px);
  line-height: 1.2;
  letter-spacing: 0;
  text-shadow: 0 0 40px rgba(230,0,18,0.5);
  word-break: break-all;
  overflow-wrap: anywhere;
}

.stat.stat--hero::before {
  opacity: 1;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #ff3333, var(--accent));
}

.stat:hover::before { opacity: 1; }

.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.stat-value {
  font-size: clamp(13px, 3.5vw, 22px);
  font-weight: 400;
  font-family: 'Press Start 2P', monospace;
  color: var(--accent);
  line-height: 1.2;
  letter-spacing: 0;
  word-break: break-all;
  overflow-wrap: anywhere;
}

.progress {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 12px;
}

/* Gameplay snap thumbnail */
.snap-thumb {
  position: relative;
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
  aspect-ratio: 4/3;
  background: #000;
}

.snap-thumb:hover {
  border-color: var(--accent);
}

.snap-play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}

.snap-thumb:hover .snap-play-btn {
  opacity: 1;
}

.snap-play-btn svg {
  filter: drop-shadow(0 0 8px rgba(230,0,18,0.8));
}

/* Milestone bar */
.milestone-bar-wrap {
  margin-top: 20px;
  width: 100%;
}

.milestone-track {
  position: relative;
  height: 14px;
  background: rgba(255,255,255,0.06);
  border: 2px solid var(--border);
  image-rendering: pixelated;
  overflow: visible;
}

.milestone-fill {
  height: 100%;
  width: 0%;
  background: repeating-linear-gradient(
    90deg,
    var(--accent) 0px,
    var(--accent) 6px,
    #b0000e 6px,
    #b0000e 12px
  );
  transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 10px rgba(230,0,18,0.6), inset 0 1px 0 rgba(255,100,100,0.3);
  image-rendering: pixelated;
  position: relative;
  z-index: 1;
}

/* Tick marks on the track */
.milestone-markers {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.milestone-tick {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(255,255,255,0.15);
  transform: translateX(-50%);
}

.milestone-tick.reached {
  background: rgba(255,255,255,0.55);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
}

/* Labels row - hidden */
.milestone-labels { display: none; }
.milestone-lbl { display: none; }

/* Achievement flash banner */
.milestone-achieved {
  min-height: 22px;
  margin-top: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: transparent;
  text-align: center;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}

.milestone-achieved.flash {
  animation: achieveFlash 2.4s ease-out forwards;
}

@keyframes achieveFlash {
  0%   { color: #fff; text-shadow: 0 0 14px rgba(230,0,18,1), 0 0 4px #fff; }
  30%  { color: var(--accent); text-shadow: 0 0 10px rgba(230,0,18,0.8); }
  80%  { color: var(--accent); text-shadow: 0 0 6px rgba(230,0,18,0.4); }
  100% { color: var(--muted); text-shadow: none; }
}

/* Controls */
.controls {
  display: grid;
  grid-template-columns: 1fr repeat(2, minmax(160px, auto)) repeat(3, auto);
  gap: 10px;
  align-items: center;
  margin: 24px 0 16px;
}

.controls input,
.controls select {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  min-width: 0;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
}

.controls input:focus,
.controls select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(230,0,18,0.15);
}

.controls input::placeholder { color: var(--muted); }

button {
  border: 0;
  border-radius: 10px;
  padding: 11px 18px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

button.primary {
  background: var(--accent);
  color: #ffffff;
  box-shadow: 0 0 20px rgba(230,0,18,0.3);
}

button.primary:hover { box-shadow: 0 0 28px rgba(230,0,18,0.5); transform: translateY(-1px); }

button.secondary {
  background: var(--surface2);
  color: var(--ink);
  border: 1px solid var(--border);
}

button.secondary:hover { border-color: var(--accent); color: var(--accent); }

button.danger {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(255,77,106,0.3);
}

button.danger:hover { background: rgba(255,77,106,0.1); border-color: var(--red); }

button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.note {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}

.note .warn { color: var(--gold); }

/* Table */
.tablewrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 6px;
  margin-top: 8px;
}

thead th {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 14px 10px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}

th.sortable {
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}

th.sortable:hover { color: var(--accent); }
th.sortable.active { color: var(--accent); }

tbody tr {
  transition: transform 0.15s;
}

tbody tr:hover { transform: translateX(3px); }

td {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 13px 14px;
  vertical-align: middle;
  transition: background 0.15s;
}

tbody tr:hover td { background: var(--surface2); }

td:first-child {
  border-left: 1px solid var(--border);
  border-radius: 12px 0 0 12px;
}

td:last-child {
  border-right: 1px solid var(--border);
  border-radius: 0 12px 12px 0;
}

tbody tr:hover td:first-child { border-left-color: rgba(0,229,192,0.3); }

.game-id {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.game-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}

.game-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(30,45,66,0.8);
  border: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.price-val {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.price-val.has-price { color: var(--accent); }

.price-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

.link {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
}

.link:hover { color: var(--accent); }

.link + .link { margin-left: 12px; }

/* Checkbox */
.owned-check {
  display: none;
}

.pixel-check {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.pixel-check:hover {
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(230,0,18,0.2);
}

.pixel-check.is-checked {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(230,0,18,0.6);
}

.pixel-check svg {
  display: none;
  width: 28px;
  height: 28px;
  image-rendering: pixelated;
}

.pixel-check.is-checked svg {
  display: block;
}

/* Cover art */
.cover-cell {
  width: 48px;
  padding: 6px 10px !important;
}

.cover-wrap {
  position: relative;
  width: 90px;
  height: 124px;
  border-radius: 4px;
  overflow: visible;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.cover-thumb {
  width: 90px;
  height: 124px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: block;
  background: var(--surface2);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.cover-wrap:hover .cover-thumb {
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(230,0,18,0.4);
}

.cover-placeholder {
  width: 90px;
  height: 124px;
  border-radius: 4px;
  border: 1px dashed var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--muted);
  opacity: 0.5;
}

.cover-loading {
  width: 90px;
  height: 124px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cover-loading::after {
  content: '';
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Hover popup */
#artPopup {
  position: fixed;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.8));
}

#artPopup.visible { opacity: 1; }

#artPopup img {
  width: 180px;
  height: auto;
  border-radius: 8px;
  border: 2px solid var(--accent);
  display: block;
}

#artPopup .popup-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
  max-width: 180px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Footer */
.footer {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding: 28px 0 40px;
  border-top: 1px solid var(--border);
  margin-top: 32px;
}

#priceStatus {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 16px;
}

@media (max-width: 1100px) {
  .stats { grid-template-columns: repeat(3, 1fr); }
  .stat.stat--hero { grid-column: 1 / -1; }
  .controls { grid-template-columns: 1fr 1fr; }
  table { min-width: 900px; }
}

@media (max-width: 640px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .stat.stat--hero { grid-column: 1 / -1; }
  .header-inner { flex-direction: column; align-items: flex-start; gap: 0; }
  .controls { grid-template-columns: 1fr 1fr; }
  .stat.stat--hero { padding: 20px 16px; }
  .stat-value { font-size: clamp(11px, 5vw, 18px); }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1 id="retroTitle" style="font-family:'Press Start 2P', monospace;font-size:10vw;letter-spacing:0.02em;line-height:1;width:100%;text-align:center;white-space:nowrap;">Retro<span>Quest</span></h1>

    </div>
  </div>
</header>

<main class="wrap">

  <div class="stats">
    <div class="stat" style="align-items:center;text-align:center;">
      <div class="stat-label">Owned</div>
      <div class="stat-value" id="ownedCount">0</div>
      <div class="game-sub" style="margin-top:6px">of 677 titles</div>
    </div>
    <div class="stat" style="align-items:center;text-align:center;">
      <div class="stat-label">Missing</div>
      <div class="stat-value" id="missingCount" style="color:var(--ink)">677</div>
    </div>
    <div class="stat stat--hero">
      <div class="stat-label">Completion</div>
      <div class="stat-value" id="completion" style="width:100%;text-align:center;">0%</div>
      <div class="milestone-bar-wrap">
        <div class="milestone-track">
          <div class="milestone-fill" id="bar"></div>
          <div class="milestone-markers" id="milestoneMarkers"></div>
        </div>
        <div class="milestone-labels" id="milestoneLabels"></div>
      </div>
      <div class="milestone-achieved" id="milestoneAchieved"></div>
    </div>
    <div class="stat" style="align-items:center;text-align:center;">
      <div class="stat-label">Collection Value</div>
      <div class="stat-value" id="collectionValue">$0</div>
    </div>
    <div class="stat" style="align-items:center;text-align:center;">
      <div class="stat-label">Full Set Value</div>
      <div class="stat-value" style="color:var(--gold)" id="setValue">$0</div>
    </div>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search games, developer, year…">
    <select id="statusFilter">
      <option value="all">All games</option>
      <option value="owned">Owned</option>
      <option value="missing">Missing</option>
      <option value="priced">Priced</option>
      <option value="unpriced">Unpriced</option>
    </select>
    <select id="developerFilter"><option value="all">All developers</option></select>
    <select id="yearFilter"><option value="all">All years</option></select>
    <button class="primary" id="refreshVisible">Refresh prices</button>
    <button class="secondary" id="exportData">Export save</button>
    <button class="danger" id="resetData">Reset</button>
  </div>

  <p id="priceStatus"></p>

  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="owned">Own</th>
          <th>Cover</th>
          <th class="sortable" data-sort="title">Game</th>
          <th class="sortable" data-sort="year">Year</th>
          <th class="sortable" data-sort="estimate">eBay Est.</th>
          <th class="sortable" data-sort="updatedAt">Updated</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    Data saves in this browser via localStorage. Cover art served from your GitHub Pages image archive.
  </div>

</main>

<!-- Art hover popup -->
<div id="artPopup">
  <img id="artPopupImg" src="" alt="">
  <div class="popup-title" id="artPopupTitle"></div>
</div>

<!-- Game Detail Modal -->
<div id="gameModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);overflow-y:auto;">
  <div id="gameModalInner" style="max-width:900px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;">
    <button onclick="closeModal()" title="Close" style="position:absolute;top:16px;right:16px;background:#e60012;border:none;border-radius:0;width:32px;height:32px;padding:0;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;box-shadow:inset -2px -2px 0 #8b0000,inset 2px 2px 0 #ff4444;">
      <svg width="20" height="20" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
        <rect x="0" y="0" width="2" height="2" fill="white"/>
        <rect x="8" y="0" width="2" height="2" fill="white"/>
        <rect x="2" y="2" width="2" height="2" fill="white"/>
        <rect x="6" y="2" width="2" height="2" fill="white"/>
        <rect x="4" y="4" width="2" height="2" fill="white"/>
        <rect x="2" y="6" width="2" height="2" fill="white"/>
        <rect x="6" y="6" width="2" height="2" fill="white"/>

<script>
const TRAILER_BASE_URL = "https://archive.org/download/RetroQuest-Trailers-NES/";
const STORAGE_KEY = "nesTrackerSaveV2";
const rawState = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
const oldState = JSON.parse(localStorage.getItem("nesTrackerSaveV1") || "{}");
const state = Object.keys(rawState).length ? rawState : oldState;
const games = (window.nesGames || []).map(g => ({ ...g, ...(state[g.id] || {}) }));

let sortKey = "title";
let sortDir = "asc";

const fmt = n => Number.isFinite(Number(n))
  ? Number(n).toLocaleString(undefined, { style: 'currency', currency: 'USD' })
  : "—";

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const STORAGE_KEY2 = "nesTrackerSaveV2";

function save() {
  const out = {};
  games.forEach(g => {
    const { id, owned, estimate, resultCount, updatedAt } = g;
    if (owned || estimate) out[id] = { owned, estimate, resultCount, updatedAt };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
}

// ─── Image URL helper ─────────────────────────────────────────────────────────
const BASE = 'https://16bitkas.github.io/NES-Price-Tracker-/';

function toImageName(title) {
  // Convert title to match filename convention:
  // "1943: The Battle of Midway" -> "1943 - The Battle of Midway (USA)"
  // "720" -> "720 Degrees (USA)"
  let name = title
    .replace(/:/g, ' - ')  // colon -> space dash space
    .replace(/\s+/g, ' ')  // normalize spaces
    .trim();
  return name + ' (USA)';
}

function imgUrl(folder, title) {
  const manifest = window.nesAssetManifest || {};
  const entry = manifest[title];

  const folderKeyMap = {
    boxfronts: 'boxfront',
    boxbacks: 'boxback',
    cartridges: 'cartridge',
    clearlogos: 'clearlogo',
    snaps: 'snap',
    titles: 'title'
  };

  const key = folderKeyMap[folder];

  if (entry && entry[key]) {
    return BASE + entry[key].split('/').map(encodeURIComponent).join('/');
  }

  return BASE + folder + '/' + encodeURIComponent(toImageName(title)) + '.png';
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function valueOf(g) { return Number(g.estimate) || 0; }

// ─── Milestones ───────────────────────────────────────────────────────────────
// 7 milestones: 10%, 25%, 50%, 75%, 90% (10% left), last-5, 100%
// last-5 and 90% positions are computed from total at runtime
let _prevMilestonesReached = new Set();

function getMilestones(total) {
  const last5pct = ((total - 5) / total * 100);
  return [
    { pct: 10,      icon: '★', label: '10%'    },
    { pct: 25,      icon: '♦', label: '25%'    },
    { pct: 50,      icon: '♥', label: '50%'    },
    { pct: 75,      icon: '♣', label: '75%'    },
    { pct: 90,      icon: '!', label: '90%'    },
    { pct: Math.max(last5pct, 91), icon: '5', label: 'LAST 5' },
    { pct: 100,     icon: '✦', label: '100%'   },
  ];
}

function renderMilestoneBar(ownedCount, total) {
  const pct = ownedCount / total * 100;
  const milestones = getMilestones(total);

  // Build tick markers
  const markersEl = document.getElementById('milestoneMarkers');
  const labelsEl  = document.getElementById('milestoneLabels');

  if (!markersEl._built) {
    markersEl.innerHTML = milestones.map(m =>
      `<div class="milestone-tick" id="tick-${m.label.replace(/\s/g,'_')}" style="left:${m.pct}%"></div>`
    ).join('');
    labelsEl.innerHTML = milestones.map(m =>
      `<div class="milestone-lbl" id="lbl-${m.label.replace(/\s/g,'_')}" style="left:${m.pct}%">
        <span class="lbl-icon">${m.icon}</span>${m.label}
      </div>`
    ).join('');
    markersEl._built = true;
  }

  // Update reached states & detect newly crossed milestones
  let newlyReached = null;
  milestones.forEach(m => {
    const key = m.label.replace(/\s/g,'_');
    const reached = pct >= m.pct;
    document.getElementById('tick-' + key)?.classList.toggle('reached', reached);
    document.getElementById('lbl-'  + key)?.classList.toggle('reached', reached);
    if (reached && !_prevMilestonesReached.has(key)) {
      newlyReached = m;
      _prevMilestonesReached.add(key);
    }
  });

  // Achievement flash
  if (newlyReached) {
    const el = document.getElementById('milestoneAchieved');
    el.textContent = '>> ' + newlyReached.label + ' REACHED! <<';
    el.classList.remove('flash');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('flash');
    // chiptune celebration
    playCollectSound && playCollectSound();
  }
}

function renderStats() {
  const owned = games.filter(g => g.owned);
  const total = games.length;
  const pct = (owned.length / total * 100).toFixed(1);
  document.getElementById('ownedCount').textContent = owned.length;
  document.getElementById('missingCount').textContent = total - owned.length;
  document.getElementById('completion').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('collectionValue').textContent = fmt(owned.reduce((s,g) => s + valueOf(g), 0));
  document.getElementById('setValue').textContent = fmt(games.reduce((s,g) => s + valueOf(g), 0));
  renderMilestoneBar(owned.length, total);
}

// ─── Filters ──────────────────────────────────────────────────────────────────
const developerOf = g => g.developer || g.publisher || '';
const yearOf = g => g.year || g.releaseYear || g.release_year || 'Unknown';

function populateFilters() {
  const devs = [...new Set(games.map(developerOf).filter(Boolean))].sort();
  const devSel = document.getElementById('developerFilter');
  devs.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; devSel.appendChild(o); });

  const years = [...new Set(games.map(yearOf).filter(y => y !== 'Unknown'))].sort();
  const yrSel = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o); });
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const dev = document.getElementById('developerFilter').value;
  const yr = document.getElementById('yearFilter').value;

  return games.filter(g => {
    if (q && !g.title.toLowerCase().includes(q) && !developerOf(g).toLowerCase().includes(q) && !String(yearOf(g)).includes(q)) return false;
    if (status === 'owned' && !g.owned) return false;
    if (status === 'missing' && g.owned) return false;
    if (status === 'priced' && !valueOf(g)) return false;
    if (status === 'unpriced' && valueOf(g)) return false;
    if (dev !== 'all' && developerOf(g) !== dev) return false;
    if (yr !== 'all' && String(yearOf(g)) !== yr) return false;
    return true;
  }).sort((a, b) => {
    let av, bv;
    if (sortKey === 'owned') { av = a.owned ? 1 : 0; bv = b.owned ? 1 : 0; }
    else if (sortKey === 'year') { av = Number(yearOf(a)) || 9999; bv = Number(yearOf(b)) || 9999; }
    else if (sortKey === 'estimate') { av = valueOf(a); bv = valueOf(b); }
    else if (sortKey === 'updatedAt') { av = a.updatedAt || 0; bv = b.updatedAt || 0; }
    else { av = String(a[sortKey] ?? '').toLowerCase(); bv = String(b[sortKey] ?? '').toLowerCase(); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

async function refreshGame(g) {

  const data = await res.json();
  g.estimate = data.estimate;

}

});

// ─── Chiptune collect sound ──────────────────────────────────────────────────
function playCollectSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Classic NES-style rising arpeggio: square wave, 3 quick notes
  const notes = [
    { freq: 261.6, start: 0.00, dur: 0.07 },   // C4
    { freq: 392.0, start: 0.07, dur: 0.07 },   // G4
    { freq: 523.3, start: 0.14, dur: 0.07 },   // C5
    { freq: 784.0, start: 0.21, dur: 0.12 },   // G5 — held finish
  ];

  notes.forEach(({ freq, start, dur }) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);

    gain.gain.setValueAtTime(0.18, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur);
  });

  // Close context after sound finishes
  setTimeout(() => ctx.close(), 500);
}

function playUncheckSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = 'square';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.12);

  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);

  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.13);

  setTimeout(() => ctx.close(), 300);
}

document.getElementById('tbody').addEventListener('click', e => {

  const tr = pc.closest('tr');
  if (!tr) return;
  const g = games.find(x => x.id == tr.dataset.id);
  if (!g) return;
  g.owned = !g.owned;
  pc.classList.toggle('is-checked', g.owned);
  const cb = tr.querySelector('.owned-check');
  if (cb) cb.checked = g.owned;
  if (g.owned) playCollectSound(); else playUncheckSound();
  save();
  renderStats();
});

document.getElementById('tbody').addEventListener('change', e => {
  const tr = e.target.closest('tr');
  if (!tr) return;
  const g = games.find(x => x.id == tr.dataset.id);
  if (e.target.classList.contains('owned-check')) g.owned = e.target.checked;
  save();
  renderStats();
});

// ─── Filter listeners ─────────────────────────────────────────────────────────
['search', 'statusFilter', 'developerFilter', 'yearFilter'].forEach(id => {
  document.getElementById(id).addEventListener(id === 'search' ? 'input' : 'change', render);
});

// ─── Refresh prices ───────────────────────────────────────────────────────────
document.getElementById('refreshVisible').addEventListener('click', async () => {
  const btn = document.getElementById('refreshVisible');
  const status = document.getElementById('priceStatus');
  btn.disabled = true;
  const list = filtered();
  let done = 0;
  status.textContent = `Refreshing 0 of ${list.length} games… keep this tab open.`;
  for (const g of list) {
    try { await refreshGame(g); } catch (err) { console.error(g.title, err); }
    done++;
    status.textContent = `Refreshing ${done} of ${list.length} games…`;
    await new Promise(r => setTimeout(r, 500));
  }
  status.textContent = `Done. Refreshed ${done} games.`;
  btn.disabled = false;
});

// ─── Export ───────────────────────────────────────────────────────────────────
document.getElementById('exportData').addEventListener('click', () => {
  const blob = new Blob([localStorage.getItem(STORAGE_KEY) || '{}'], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nes-tracker-save.json';
  a.click();
});

// ─── Reset ────────────────────────────────────────────────────────────────────
document.getElementById('resetData').addEventListener('click', () => {
  if (confirm('Clear your owned games and price cache in this browser?')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

// ─── Hover popup (box front preview) ─────────────────────────────────────────
const popup    = document.getElementById('artPopup');
const popupImg = document.getElementById('artPopupImg');
const popupTtl = document.getElementById('artPopupTitle');

document.getElementById('tbody').addEventListener('mouseover', e => {
  const wrap = e.target.closest('.cover-wrap');
  if (!wrap) return;
  const title = wrap.dataset.title;
  popupImg.src = imgUrl('boxfronts', title);
  popupTtl.textContent = title;
  popup.classList.add('visible');
});

document.getElementById('tbody').addEventListener('mousemove', e => {
  const wrap = e.target.closest('.cover-wrap');
  if (!wrap) { popup.classList.remove('visible'); return; }
  const margin = 16;
  const pw = 180 + margin;
  let left = e.clientX + margin;
  let top  = e.clientY - 60;
  if (left + pw > window.innerWidth) left = e.clientX - pw;
  if (top < 8) top = 8;
  popup.style.left = left + 'px';
  popup.style.top  = top + 'px';
});

document.getElementById('tbody').addEventListener('mouseout', e => {
  const wrap = e.target.closest('.cover-wrap');
  if (!wrap) return;
  popup.classList.remove('visible');
});

populateFilters();
// Pre-seed reached milestones so initial render doesn't trigger achievement flashes
{
  const owned = games.filter(g => g.owned).length;
  const total = games.length;
  const pct = owned / total * 100;
  getMilestones(total).forEach(m => {
    if (pct >= m.pct) _prevMilestonesReached.add(m.label.replace(/\s/g,'_'));
  });
}
render();
</script>
<!-- Video Trailer Overlay -->
<div id="trailerOverlay" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;">
  <div style="position:relative;width:min(860px,94vw);">
    <button onclick="closeTrailer()" style="position:absolute;top:-44px;right:0;background:rgba(255,255,255,0.08);border:2px solid var(--border);color:var(--ink);border-radius:0;width:32px;height:32px;padding:0;font-size:13px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;font-family:'Press Start 2P',monospace;line-height:1;">X</button>
    <div id="trailerError" style="display:none;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--accent);text-align:center;padding:20px 0 12px;letter-spacing:0.06em;">! NO VIDEO FILE FOUND !</div>
    <video id="trailerVideo"
      controls autoplay
      style="width:100%;border:2px solid var(--border);background:#000;display:block;image-rendering:pixelated;"
      onerror="showTrailerError()">
    </video>
    <div id="trailerTitle" style="font-family:'Press Start 2P',monospace;font-size:9px;color:var(--muted);text-align:center;margin-top:12px;letter-spacing:0.08em;"></div>
  </div>
</div>

<script>
function openTrailer(filename) {
  const overlay = document.getElementById('trailerOverlay');
  const video   = document.getElementById('trailerVideo');
  const errEl   = document.getElementById('trailerError');
  const titleEl = document.getElementById('trailerTitle');

  const src = filename.includes('/')
    ? BASE + filename.split('/').map(encodeURIComponent).join('/')
    : TRAILER_BASE_URL + encodeURIComponent(filename);
  errEl.style.display  = 'none';
  video.style.display  = 'block';
  video.src = src;
  titleEl.textContent  = filename.replace('.mp4','');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Detect missing file
  video.onerror = () => showTrailerError();
  video.load();
}

function showTrailerError() {
  const video = document.getElementById('trailerVideo');
  const errEl = document.getElementById('trailerError');
  video.style.display = 'none';
  errEl.style.display = 'block';
}

function closeTrailer() {
  const overlay = document.getElementById('trailerOverlay');
  const video   = document.getElementById('trailerVideo');
  video.pause();
  video.src = '';
  overlay.style.display = 'none';
  document.body.style.overflow = '';
}

// Close on backdrop click or Escape
document.getElementById('trailerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('trailerOverlay')) closeTrailer();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('trailerOverlay').style.display === 'flex') closeTrailer();
});
</script>
