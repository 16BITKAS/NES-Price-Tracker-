<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NES Collection Dashboard</title>
<script src="nes-games.js"></script>
<script src="nes-asset-manifest.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111111;
  --surface: #1c1c1c;
  --surface2: #242424;
  --border: #2e2e2e;
  --ink: #f0ece8;
  --muted: #6b6b6b;
  --accent: #e60012;
  --accent2: #ff3333;
  --gold: #c8c8c8;
  --red: #e60012;
  --glow: rgba(230,0,18,0.15);
}

/* Light mode overrides */
body.light-mode {
  --bg: #f0ece8;
  --surface: #ffffff;
  --surface2: #e8e4e0;
  --border: #d0ccc8;
  --ink: #1a1a1a;
  --muted: #888888;
  --accent: #e60012;
  --accent2: #ff3333;
  --gold: #555555;
  --red: #e60012;
  --glow: rgba(230,0,18,0.10);
}

body.light-mode::before {
  background-image:
    linear-gradient(rgba(230,0,18,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,0,18,0.06) 1px, transparent 1px);
}

body.light-mode::after {
  background: radial-gradient(ellipse, rgba(230,0,18,0.09) 0%, transparent 65%);
}

body.light-mode .pill {
  background: #ffffff;
  border-color: #d0ccc8;
  color: #1a1a1a;
}

body.light-mode td:last-child .pill,
body.light-mode .game-sub .pill {
  background: #ffffff;
  border-color: #d0ccc8;
  color: #1a1a1a;
}

/* Tiny row trailer play button */
.row-play-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #e60012;
  border: none;
  border-radius: 2px;
  width: 18px;
  height: 13px;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 1px 1px 0 #8b0000, -1px -1px 0 rgba(255,255,255,0.15) inset;
  transition: transform 0.1s, box-shadow 0.1s;
  vertical-align: middle;
  image-rendering: pixelated;
}
.row-play-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 0 6px rgba(230,0,18,0.7), 1px 1px 0 #8b0000;
}
.row-play-btn:active {
  transform: scale(0.95);
}
.pixel-toggle-wrap {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  user-select: none;
}

.pixel-toggle {
  position: relative;
  width: 52px;
  height: 26px;
  cursor: pointer;
  image-rendering: pixelated;
  flex-shrink: 0;
}

.pixel-toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

.pixel-track {
  position: absolute;
  inset: 0;
  background: var(--surface2);
  border: 3px solid var(--border);
  box-shadow: inset 2px 2px 0 rgba(0,0,0,0.2), 3px 3px 0 rgba(0,0,0,0.3);
  transition: background 0.15s, border-color 0.15s;
}

.pixel-toggle input:checked ~ .pixel-track {
  background: #e8e4e0;
  border-color: #c0bcb8;
}

.pixel-knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: #e60012;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  transition: transform 0.15s, background 0.15s;
  image-rendering: pixelated;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  line-height: 1;
  color: #ffffff;
}

.pixel-toggle input:checked ~ .pixel-track .pixel-knob {
  transform: translateX(26px);
  background: #ffffff;
  color: #e60012;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(230,0,18,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,0,18,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: -40%;
  left: -20%;
  width: 80%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(230,0,18,0.07) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 1;
  padding: 13px 0 8px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(230,0,18,0.05) 0%, transparent 100%);
}

.header-inner {
  width: 100%;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,0,18,0.08);
  border: 1px solid rgba(230,0,18,0.3);
  border-radius: 4px;
  padding: 5px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.header-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(230,0,18,0.5);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

h1 {
  font-size: clamp(32px, 5vw, 58px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink);
}

h1 span { color: var(--accent); }

.tagline {
  color: var(--muted);
  font-size: 14px;
  margin-top: 10px;
  font-family: 'Space Mono', monospace;
}

.wrap {
  max-width: 1380px;
  margin: 0 auto;
  padding: 0 28px 28px;
  position: relative;
  z-index: 1;
}

.sticky-panel {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--bg);
  padding-top: 20px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 0;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: auto auto;
  gap: 8px;
  margin: 0 0 10px;
  align-items: stretch;
}

.stat-stack {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stat-stack .stat {
  flex: 1;
  min-height: 0;
}

@media (max-width: 700px) {
  .stats {
    grid-template-columns: 1fr 1fr;
  }
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.stat:hover {
  border-color: rgba(0,229,192,0.35);
  transform: translateY(-2px);
}

.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.stat.stat--hero {
  border-color: rgba(230,0,18,0.35);
  background: linear-gradient(135deg, rgba(230,0,18,0.08) 0%, var(--surface) 60%);
  box-shadow: 0 0 0 1px rgba(230,0,18,0.2), 0 0 40px rgba(230,0,18,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 4px 20px;
  align-self: stretch;
  height: 100%;
}

.stat.stat--hero .stat-label {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 1px;
}

.stat.stat--hero .stat-value {
  font-size: 18px;
  line-height: 1;
  letter-spacing: 0;
  text-shadow: 0 0 40px rgba(230,0,18,0.5);
  white-space: nowrap;
  overflow: hidden;
  width: 100%;
}

.stat.stat--hero::before {
  opacity: 1;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #ff3333, var(--accent));
}

.stat:hover::before { opacity: 1; }

.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1px;
}

.stat-value {
  font-size: 18px;
  font-weight: 400;
  font-family: 'Press Start 2P', monospace;
  color: var(--accent);
  line-height: 1;
  letter-spacing: 0;
  white-space: nowrap;
  overflow: hidden;
  width: 100%;
  display: block;
}

.progress {
  height: 3px;
  background: var(--border);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 12px;
}

/* Gameplay snap thumbnail */
.snap-thumb {
  position: relative;
  width: 100%;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
  aspect-ratio: 4/3;
  background: #000;
}

.snap-thumb:hover {
  border-color: var(--accent);
}

.snap-play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}

.snap-thumb:hover .snap-play-btn {
  opacity: 1;
}

.snap-play-btn svg {
  filter: drop-shadow(0 0 8px rgba(230,0,18,0.8));
}

/* Milestone bar */
.milestone-bar-wrap {
  margin-top: 20px;
  width: 100%;
}

.milestone-track {
  position: relative;
  height: 14px;
  background: rgba(255,255,255,0.06);
  border: 2px solid var(--border);
  image-rendering: pixelated;
  overflow: visible;
}

.milestone-fill {
  height: 100%;
  width: 0%;
  background: repeating-linear-gradient(
    90deg,
    var(--accent) 0px,
    var(--accent) 6px,
    #b0000e 6px,
    #b0000e 12px
  );
  transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 10px rgba(230,0,18,0.6), inset 0 1px 0 rgba(255,100,100,0.3);
  image-rendering: pixelated;
  position: relative;
  z-index: 1;
}

/* Tick marks on the track */
.milestone-markers {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.milestone-tick {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(255,255,255,0.15);
  transform: translateX(-50%);
}

.milestone-tick.reached {
  background: rgba(255,255,255,0.55);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
}

/* Labels row - hidden */
.milestone-labels { display: none; }
.milestone-lbl { display: none; }

/* Achievement flash banner */
.milestone-achieved {
  min-height: 22px;
  margin-top: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: transparent;
  text-align: center;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}

.milestone-achieved.flash {
  animation: achieveFlash 2.4s ease-out forwards;
}

@keyframes achieveFlash {
  0%   { color: #fff; text-shadow: 0 0 14px rgba(230,0,18,1), 0 0 4px #fff; }
  30%  { color: var(--accent); text-shadow: 0 0 10px rgba(230,0,18,0.8); }
  80%  { color: var(--accent); text-shadow: 0 0 6px rgba(230,0,18,0.4); }
  100% { color: var(--muted); text-shadow: none; }
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: nowrap;
  gap: 6px;
  align-items: center;
  margin: 0 0 10px;
  min-width: 0;
}

.controls input,
.controls select {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 10px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  min-width: 0;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
  flex-shrink: 1;
}

#search { flex: 2 1 120px; }
#statusFilter, #developerFilter, #yearFilter { flex: 1 1 80px; }

.controls input:focus,
.controls select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(230,0,18,0.15);
}

.controls input::placeholder { color: var(--muted); }

button {
  border: 0;
  border-radius: 10px;
  padding: 7px 14px;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

button.primary {
  background: var(--accent);
  color: #ffffff;
  box-shadow: 0 0 20px rgba(230,0,18,0.3);
}

button.primary:hover { box-shadow: 0 0 28px rgba(230,0,18,0.5); transform: translateY(-1px); }

button.secondary {
  background: var(--surface2);
  color: var(--ink);
  border: 1px solid var(--border);
}

button.secondary:hover { border-color: var(--accent); color: var(--accent); }

button.floppy-btn {
  background: transparent;
  border: 2px solid rgba(230,0,18,0.4);
  border-radius: 6px;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  flex-shrink: 0;
}

button.floppy-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(230,0,18,0.4), 2px 2px 0 rgba(0,0,0,0.3);
  transform: translateY(-1px);
}

button.danger {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(255,77,106,0.3);
}

button.danger:hover { background: rgba(255,77,106,0.1); border-color: var(--red); }

button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.note {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}

.note .warn { color: var(--gold); }

/* Table */
.tablewrap { overflow-x: auto; }

/* Sticky thead fix: clip overflow on a wrapper that doesn't affect sticky positioning */
.tablewrap-outer { overflow-x: clip; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 6px;
  margin-top: 8px;
}

thead th {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 14px 10px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: var(--sticky-panel-height, 280px);
  background: var(--bg);
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

th.sortable {
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}

th.sortable:hover { color: var(--accent); }
th.sortable.active { color: var(--accent); }

tbody tr {
  transition: transform 0.15s;
  position: relative;
  z-index: 1;
}

tbody tr:hover { transform: translateX(3px); }

td {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 13px 14px;
  vertical-align: middle;
  transition: background 0.15s;
}

tbody tr:hover td { background: var(--surface2); }

td:first-child {
  border-left: 1px solid var(--border);
  border-radius: 12px 0 0 12px;
}

td:last-child {
  border-right: 1px solid var(--border);
  border-radius: 0 12px 12px 0;
}

tbody tr:hover td:first-child { border-left-color: rgba(0,229,192,0.3); }

.game-id {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.game-title {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 20.7px;
  letter-spacing: -0.01em;
  text-decoration: underline;
}

.game-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(30,45,66,0.8);
  border: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.price-val {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.price-val.has-price { color: var(--accent); }

.price-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

.link {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
}

.link:hover { color: var(--accent); }

.link + .link { margin-left: 12px; }

/* Checkbox */
.owned-check {
  display: none;
}

.pixel-check {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.pixel-check:hover {
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(230,0,18,0.2);
}

.pixel-check.is-checked {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(230,0,18,0.6);
}

.pixel-check svg {
  display: none;
  width: 28px;
  height: 28px;
  image-rendering: pixelated;
}

.pixel-check.is-checked svg {
  display: block;
}

/* Cover art */
.cover-cell {
  width: 48px;
  padding: 6px 10px !important;
}

.cover-wrap {
  position: relative;
  width: 113px;
  height: 155px;
  border-radius: 4px;
  overflow: visible;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.cover-thumb {
  width: 113px;
  height: 155px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--accent);
  display: block;
  background: var(--surface2);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.cover-wrap:hover .cover-thumb {
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(230,0,18,0.4);
}

.cover-placeholder {
  width: 113px;
  height: 155px;
  border-radius: 4px;
  border: 1px dashed var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--muted);
  opacity: 0.5;
}

.cover-loading {
  width: 113px;
  height: 155px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cover-loading::after {
  content: '';
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Hover popup */
#artPopup {
  position: fixed;
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.8));
}

#artPopup.visible { opacity: 1; }

#artPopup img {
  width: 180px;
  height: auto;
  border-radius: 8px;
  border: 2px solid var(--accent);
  display: block;
}

#artPopup .popup-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
  max-width: 180px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Footer */
.footer {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  padding: 28px 0 40px;
  border-top: 1px solid var(--border);
  margin-top: 32px;
}

#priceStatus {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 16px;
}

@media (max-width: 1100px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .controls { grid-template-columns: 1fr 1fr; }
  table { min-width: 900px; }
}

@media (max-width: 640px) {
  .header-inner { flex-direction: column; align-items: flex-start; gap: 0; }

/* ── Image Lightbox ───────────────────────────────────────────────────────── */

</style>

<body>

<!-- Pixel art light/dark toggle is now inside header -->
<header>

    <div>

    </div>

</header>

<main class="wrap">

  <div class="sticky-panel">
    <div class="stats">

      <!-- Stack 1: Owned + Missing -->
      <div class="stat-stack">
        <div class="stat" style="align-items:center;text-align:center;padding-left:0;padding-right:0;">
          <div class="stat-label">Owned</div>
          <div class="stat-value" id="ownedCount">0</div>
        </div>
        <div class="stat" style="align-items:center;text-align:center;padding-left:0;padding-right:0;">
          <div class="stat-label">Missing</div>
          <div class="stat-value" id="missingCount" style="color:var(--ink)">677</div>
        </div>
      </div>

      <!-- Stack 2: Collection Value + Full Set Value -->
      <div class="stat-stack">
        <div class="stat" style="align-items:center;text-align:center;">

        <div class="stat" style="align-items:center;text-align:center;">

      <!-- Hero: Completion -->
      <div class="stat stat--hero" style="grid-column: 1 / -1; padding-bottom: 0;">
        <div class="stat-label" style="width:100%;text-align:center;">Completion</div>
        <div class="stat-value" id="completion" style="width:100%;text-align:center;">0%</div>
        <div class="milestone-bar-wrap" style="margin-bottom:0;">
          <div class="milestone-track">

            <div class="milestone-markers" id="milestoneMarkers"></div>

          <div class="milestone-labels" id="milestoneLabels"></div>

    </div>

    <div class="controls">

      <select id="statusFilter">

      <button class="primary" id="refreshVisible">Refresh prices</button>
      <button class="floppy-btn" id="exportData" title="Export save">
        <svg width="28" height="28" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" style="display:block;image-rendering:pixelated;">
          <!-- Body -->
          <rect x="1" y="1" width="14" height="14" fill="#e60012"/>
          <!-- Top-right corner cut -->
          <rect x="10" y="1" width="5" height="1" fill="transparent"/>
          <rect x="11" y="1" width="4" height="1" fill="#e60012"/>
          <rect x="12" y="2" width="3" height="1" fill="#e60012"/>
          <!-- Shutter slot (label area) -->
          <rect x="2" y="2" width="9" height="5" fill="#c0000e"/>
          <!-- Shutter window white strip -->
          <rect x="6" y="2" width="2" height="5" fill="#ff6666"/>
          <!-- Metal shutter slider -->
          <rect x="3" y="3" width="2" height="3" fill="#ff9999"/>
          <!-- Bottom disk read area -->
          <rect x="3" y="9" width="10" height="5" fill="#c0000e"/>
          <!-- Border outline -->
          <rect x="1" y="1" width="14" height="1" fill="#ff3333"/>
          <rect x="1" y="1" width="1" height="14" fill="#ff3333"/>
          <rect x="1" y="14" width="14" height="1" fill="#8b0000"/>
          <rect x="14" y="1" width="1" height="14" fill="#8b0000"/>
          <!-- Top-right corner notch -->
          <rect x="11" y="1" width="3" height="3" fill="#ff3333"/>
          <rect x="12" y="2" width="2" height="2" fill="#e60012"/>
          <rect x="13" y="1" width="1" height="1" fill="#8b0000"/>
        </svg>

    </div>

    <p id="priceStatus"></p>
  </div>

  <div class="tablewrap-outer"><div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="owned">Own</th>
          <th>Cover</th>
          <th class="sortable" data-sort="title">Game</th>
          <th class="sortable" data-sort="year">Year</th>
          <th class="sortable" data-sort="estimate">eBay Est.</th>
          <th class="sortable" data-sort="updatedAt">Updated</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div></div>

  <div class="footer">
    Data saves in this browser via localStorage. Cover art served from your GitHub Pages image archive.
  </div>

</main>

<!-- Art hover popup -->
<div id="artPopup">
  <img id="artPopupImg" src="" alt="">
  <div class="popup-title" id="artPopupTitle"></div>
</div>

<!-- Game Detail Modal -->
<div id="gameModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);overflow-y:auto;">
  <div id="gameModalInner" style="max-width:900px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;">
    <button onclick="closeModal()" title="Close" style="position:absolute;top:16px;right:16px;background:#e60012;border:none;border-radius:0;width:32px;height:32px;padding:0;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;box-shadow:inset -2px -2px 0 #8b0000,inset 2px 2px 0 #ff4444;">
      <svg width="20" height="20" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
        <rect x="0" y="0" width="2" height="2" fill="white"/>
        <rect x="8" y="0" width="2" height="2" fill="white"/>
        <rect x="2" y="2" width="2" height="2" fill="white"/>
        <rect x="6" y="2" width="2" height="2" fill="white"/>
        <rect x="4" y="4" width="2" height="2" fill="white"/>
        <rect x="2" y="6" width="2" height="2" fill="white"/>
        <rect x="6" y="6" width="2" height="2" fill="white"/>
        <rect x="0" y="8" width="2" height="2" fill="white"/>
        <rect x="8" y="8" width="2" height="2" fill="white"/>
      </svg>
    </button>
    <div id="modalContent" style="padding:32px;"></div>
  </div>
</div>

<script>
const TRAILER_BASE_URL = "https://archive.org/download/RetroQuest-Trailers-NES/";
const STORAGE_KEY = "nesTrackerSaveV2";
const rawState = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
const oldState = JSON.parse(localStorage.getItem("nesTrackerSaveV1") || "{}");
const state = Object.keys(rawState).length ? rawState : oldState;
const games = (window.nesGames || []).map(g => ({ ...g, ...(state[g.id] || {}) }));

let sortKey = "title";
let sortDir = "asc";

const fmt = n => Number.isFinite(Number(n))
  ? Number(n).toLocaleString(undefined, { style: 'currency', currency: 'USD' })
  : "—";

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const STORAGE_KEY2 = "nesTrackerSaveV2";

function save() {
  const out = {};
  games.forEach(g => {
    const { id, owned, estimate, resultCount, updatedAt } = g;
    if (owned || estimate) out[id] = { owned, estimate, resultCount, updatedAt };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
}

// ─── Image URL helper ─────────────────────────────────────────────────────────
const BASE = 'https://16bitkas.github.io/NES-Price-Tracker-/';

function toImageName(title) {
  // Convert title to match filename convention:
  // "1943: The Battle of Midway" -> "1943 - The Battle of Midway (USA)"
  // "720" -> "720 Degrees (USA)"
  let name = title
    .replace(/:/g, ' - ')  // colon -> space dash space
    .replace(/\s+/g, ' ')  // normalize spaces
    .trim();
  return name + ' (USA)';
}

function imgUrl(folder, title) {
  const manifest = window.nesAssetManifest || {};
  const entry = manifest[title];

  const folderKeyMap = {
    boxfronts: 'boxfront',
    boxbacks: 'boxback',
    cartridges: 'cartridge',
    clearlogos: 'clearlogo',
    snaps: 'snap',
    titles: 'title'
  };

  const key = folderKeyMap[folder];

  if (entry && entry[key]) {
    return BASE + entry[key].split('/').map(encodeURIComponent).join('/');
  }

  return BASE + 'nes/' + folder + '/' + encodeURIComponent(toImageName(title)) + '.png';
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function valueOf(g) { return Number(g.estimate) || 0; }

// ─── Milestones ───────────────────────────────────────────────────────────────
// 7 milestones: 10%, 25%, 50%, 75%, 90% (10% left), last-5, 100%
// last-5 and 90% positions are computed from total at runtime
let _prevMilestonesReached = new Set();

function getMilestones(total) {
  const last5pct = ((total - 5) / total * 100);
  return [
    { pct: 10,      icon: '★', label: '10%'    },
    { pct: 25,      icon: '♦', label: '25%'    },
    { pct: 50,      icon: '♥', label: '50%'    },
    { pct: 75,      icon: '♣', label: '75%'    },
    { pct: 90,      icon: '!', label: '90%'    },
    { pct: Math.max(last5pct, 91), icon: '5', label: 'LAST 5' },
    { pct: 100,     icon: '✦', label: '100%'   },
  ];
}

function renderMilestoneBar(ownedCount, total) {
  const pct = ownedCount / total * 100;
  const milestones = getMilestones(total);

  // Build tick markers
  const markersEl = document.getElementById('milestoneMarkers');
  const labelsEl  = document.getElementById('milestoneLabels');

  if (!markersEl._built) {
    markersEl.innerHTML = milestones.map(m =>
      `<div class="milestone-tick" id="tick-${m.label.replace(/\s/g,'_')}" style="left:${m.pct}%"></div>`
    ).join('');
    labelsEl.innerHTML = milestones.map(m =>
      `<div class="milestone-lbl" id="lbl-${m.label.replace(/\s/g,'_')}" style="left:${m.pct}%">
        <span class="lbl-icon">${m.icon}</span>${m.label}
      </div>`
    ).join('');
    markersEl._built = true;
  }

  // Update reached states & detect newly crossed milestones
  let newlyReached = null;
  milestones.forEach(m => {
    const key = m.label.replace(/\s/g,'_');
    const reached = pct >= m.pct;
    document.getElementById('tick-' + key)?.classList.toggle('reached', reached);
    document.getElementById('lbl-'  + key)?.classList.toggle('reached', reached);
    if (reached && !_prevMilestonesReached.has(key)) {
      newlyReached = m;
      _prevMilestonesReached.add(key);
    }
  });

  // Achievement flash
  if (newlyReached) {
    const el = document.getElementById('milestoneAchieved');
    el.textContent = '>> ' + newlyReached.label + ' REACHED! <<';
    el.classList.remove('flash');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('flash');
    // chiptune celebration
    playCollectSound && playCollectSound();
  }
}

function renderStats() {
  const owned = games.filter(g => g.owned);
  const total = games.length;
  const pct = (owned.length / total * 100).toFixed(1);
  document.getElementById('ownedCount').textContent = owned.length;
  document.getElementById('missingCount').textContent = total - owned.length;
  document.getElementById('completion').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('collectionValue').textContent = fmt(owned.reduce((s,g) => s + valueOf(g), 0));
  document.getElementById('setValue').textContent = fmt(games.reduce((s,g) => s + valueOf(g), 0));
  renderMilestoneBar(owned.length, total);
}

// ─── Filters ──────────────────────────────────────────────────────────────────
const developerOf = g => g.developer || g.publisher || '';
const yearOf = g => g.year || g.releaseYear || g.release_year || 'Unknown';

function populateFilters() {
  const devs = [...new Set(games.map(developerOf).filter(Boolean))].sort();
  const devSel = document.getElementById('developerFilter');
  devs.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; devSel.appendChild(o); });

  const years = [...new Set(games.map(yearOf).filter(y => y !== 'Unknown'))].sort();
  const yrSel = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o); });
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const dev = document.getElementById('developerFilter').value;
  const yr = document.getElementById('yearFilter').value;

  return games.filter(g => {
    if (q && !g.title.toLowerCase().includes(q) && !developerOf(g).toLowerCase().includes(q) && !String(yearOf(g)).includes(q)) return false;
    if (status === 'owned' && !g.owned) return false;
    if (status === 'missing' && g.owned) return false;
    if (status === 'priced' && !valueOf(g)) return false;
    if (status === 'unpriced' && valueOf(g)) return false;
    if (dev !== 'all' && developerOf(g) !== dev) return false;
    if (yr !== 'all' && String(yearOf(g)) !== yr) return false;
    return true;
  }).sort((a, b) => {
    let av, bv;
    if (sortKey === 'owned') { av = a.owned ? 1 : 0; bv = b.owned ? 1 : 0; }
    else if (sortKey === 'year') { av = Number(yearOf(a)) || 9999; bv = Number(yearOf(b)) || 9999; }
    else if (sortKey === 'estimate') { av = valueOf(a); bv = valueOf(b); }
    else if (sortKey === 'updatedAt') { av = a.updatedAt || 0; bv = b.updatedAt || 0; }
    else { av = String(a[sortKey] ?? '').toLowerCase(); bv = String(b[sortKey] ?? '').toLowerCase(); }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

const ebayUrl = t => 'https://www.ebay.com/sch/i.html?_nkw=' + encodeURIComponent(t + ' NES cartridge') + '&_sop=12';
const priceChartingUrl = t => 'https://www.pricecharting.com/search-products?q=' + encodeURIComponent(t);

// ─── Trailer filename helper (global so row render can use it) ────────────────
function trailerName(title) {
  let name = title
    .replace(/:/g, ' -')
    .replace(/\s+/g, ' ')
    .trim();
  return name + ' (USA).mp4';
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  const list = filtered();
  document.getElementById('tbody').innerHTML = list.map(g => {
    const dev = developerOf(g);
    const pub = g.publisher && g.publisher !== dev ? ' · ' + esc(g.publisher) : '';
    const hasPrice = valueOf(g) > 0;
    const coverSrc = imgUrl('boxfronts', g.title);
    return `<tr data-id="${g.id}" data-title="${esc(g.title)}">
      <td style="text-align:center;">
        <input class="owned-check" type="checkbox" ${g.owned ? 'checked' : ''}>
        <div class="pixel-check ${g.owned ? 'is-checked' : ''}" role="checkbox">
          <svg viewBox="0 0 7 7" xmlns="http://www.w3.org/2000/svg" style="shape-rendering:crispEdges;">
            <rect x="0" y="0" width="1" height="1" fill="white"/>
            <rect x="1" y="1" width="1" height="1" fill="white"/>
            <rect x="2" y="2" width="1" height="1" fill="white"/>
            <rect x="3" y="3" width="1" height="1" fill="white"/>
            <rect x="4" y="4" width="1" height="1" fill="white"/>
            <rect x="5" y="5" width="1" height="1" fill="white"/>
            <rect x="6" y="6" width="1" height="1" fill="white"/>
            <rect x="6" y="0" width="1" height="1" fill="white"/>
            <rect x="5" y="1" width="1" height="1" fill="white"/>
            <rect x="4" y="2" width="1" height="1" fill="white"/>
            <rect x="2" y="4" width="1" height="1" fill="white"/>
            <rect x="1" y="5" width="1" height="1" fill="white"/>
            <rect x="0" y="6" width="1" height="1" fill="white"/>
          </svg>
        </div>
      </td>
      <td class="cover-cell">
        <div class="cover-wrap" data-game-id="${g.id}" data-title="${esc(g.title)}" onclick="openModal(${g.id})">
          <img class="cover-thumb" src="${coverSrc}" alt="${esc(g.title)}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="cover-placeholder" style="display:none">🎮</div>
        </div>
      </td>
      <td>
        <div class="game-title" onclick="openModal(${g.id})" style="cursor:pointer;transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color=''">${esc(g.title)}</div>
        <div class="game-sub">${esc(dev)}${pub}</div>
        ${g.genre ? `<div class="game-sub" style="margin-top:2px;display:flex;align-items:center;gap:5px;">
          <span class="pill" style="font-size:9px;padding:1px 5px;">${esc(g.genre)}</span>
          <button class="row-play-btn" onclick="event.stopPropagation();openTrailer('${esc(trailerName(g.title))}','${esc(g.title)}')" title="Play trailer">
            <svg width="10" height="9" viewBox="0 0 10 9" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
              <polygon points="2,1 2,8 9,4.5" fill="white"/>
            </svg>
          </button>
        </div>` : ''}
        ${g.description ? `<div class="game-sub" style="margin-top:3px;font-style:italic;opacity:0.6;font-size:10px;max-width:280px;">${esc(g.description)}</div>` : ''}
        <div style="margin-top:6px;display:flex;gap:10px;">
          <a class="link" href="${ebayUrl(g.title)}" target="_blank">eBay</a>
          <a class="link" href="${priceChartingUrl(g.title)}" target="_blank">PriceCharting</a>
        </div>
      </td>
      <td><span class="pill">${esc(yearOf(g))}</span></td>
      <td>
        <div class="price-val ${hasPrice ? 'has-price' : ''}">${fmt(g.estimate)}</div>
        <div class="price-sub">${g.resultCount ? g.resultCount + ' listings' : ''}</div>
      </td>
      <td><span class="pill">${g.updatedAt ? new Date(g.updatedAt).toLocaleDateString() : 'never'}</span></td>
    </tr>`;
  }).join('');
}

// ─── Game Detail Modal ────────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('gameModal').style.display = 'none';
  document.body.style.overflow = '';
}

function openModal(gameId) {
  const g = games.find(x => x.id === gameId);
  if (!g) return;

  const front = imgUrl('boxfronts', g.title);
  const back  = imgUrl('boxbacks',  g.title);

// ─── Lightbox ─────────────────────────────────────────────────────────────────
let _lbIndex = 0;

function openLightbox(index) {
  const imgs = window._modalImages || [];
  if (!imgs.length) return;
  _lbIndex = ((index % imgs.length) + imgs.length) % imgs.length;
  _renderLightbox();
  document.getElementById('imageLightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('imageLightbox').style.display = 'none';
}

function lbNav(dir) {
  const imgs = window._modalImages || [];
  _lbIndex = ((_lbIndex + dir) + imgs.length) % imgs.length;
  _renderLightbox();
}

function _renderLightbox() {
  const imgs = window._modalImages || [];
  const item = imgs[_lbIndex];
  const img  = document.getElementById('lbImg');
  const lbl  = document.getElementById('lbLabel');
  const ctr  = document.getElementById('lbCounter');

  img.style.opacity = '0';
  img.src = item.src;
  img.onload = () => { img.style.opacity = '1'; };
  img.onerror = () => { img.style.opacity = '0.15'; };
  lbl.textContent = item.label;
  ctr.textContent = (_lbIndex + 1) + ' / ' + imgs.length;

  // Force identical dimensions for box art only
  const isBoxArt = item.label === 'Box Front' || item.label === 'Box Back';
  img.style.width      = isBoxArt ? '400px' : '';
  img.style.height     = isBoxArt ? '560px' : '';
  img.style.objectFit  = isBoxArt ? 'fill'    : 'contain';
  img.style.flexShrink = isBoxArt ? '0'       : '';

  // Update dot indicators
  document.querySelectorAll('.lb-dot').forEach((d, i) => {
    d.classList.toggle('lb-dot--active', i === _lbIndex);
  });

  // Rebuild dots (in case game changed)
  const dotsEl = document.getElementById('lbDots');
  if (dotsEl.children.length !== imgs.length) {
    dotsEl.innerHTML = imgs.map((_, i) =>
      `<div class="lb-dot${i === _lbIndex ? ' lb-dot--active' : ''}" onclick="openLightbox(${i})"></div>`
    ).join('');
  }
}

document.getElementById('gameModal').addEventListener('click', e => {
  if (e.target === document.getElementById('gameModal')) closeModal();
});

document.addEventListener('keydown', e => {
  const lb = document.getElementById('imageLightbox');
  if (lb && lb.style.display === 'flex') {
    if (e.key === 'ArrowLeft')  { lbNav(-1); return; }
    if (e.key === 'ArrowRight') { lbNav(1);  return; }
    if (e.key === 'Escape')     { closeLightbox(); return; }
  }
  if (e.key === 'Escape') closeModal();
});

// ─── Chiptune collect sound ──────────────────────────────────────────────────
function playCollectSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Classic NES-style rising arpeggio: square wave, 3 quick notes
  const notes = [
    { freq: 261.6, start: 0.00, dur: 0.07 },   // C4
    { freq: 392.0, start: 0.07, dur: 0.07 },   // G4
    { freq: 523.3, start: 0.14, dur: 0.07 },   // C5
    { freq: 784.0, start: 0.21, dur: 0.12 },   // G5 — held finish
  ];

  notes.forEach(({ freq, start, dur }) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);

    gain.gain.setValueAtTime(0.18, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur);
  });

  // Close context after sound finishes
  setTimeout(() => ctx.close(), 500);
}

function playUncheckSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = 'square';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.12);

  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.13);

  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.13);

  setTimeout(() => ctx.close(), 300);
}

document.getElementById('tbody').addEventListener('mousemove', e => {
  const wrap = e.target.closest('.cover-wrap');
  if (!wrap) { popup.classList.remove('visible'); return; }
  const margin = 16;
  const pw = 180 + margin;
  let left = e.clientX + margin;
  let top  = e.clientY - 60;
  if (left + pw > window.innerWidth) left = e.clientX - pw;
  if (top < 8) top = 8;
  popup.style.left = left + 'px';
  popup.style.top  = top + 'px';
});

(function() {
  const toggle = document.getElementById('themeToggle');
  const knob   = document.getElementById('toggleKnob');

  function applyTheme(isLight) {
    document.body.classList.toggle('light-mode', isLight);
    knob.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('nes-theme', isLight ? 'light' : 'dark');
  }

  toggle.addEventListener('change', () => applyTheme(toggle.checked));

  // Restore saved preference
  const saved = localStorage.getItem('nes-theme');

// ─── Auto-shrink stat values to fit on one line ───────────────────────────────
function fitStatValues() {
  document.querySelectorAll('.stat-value').forEach(el => {
    el.style.fontSize = '18px';
    const parent = el.closest('.stat');
    const paddingH = parseFloat(getComputedStyle(parent).paddingLeft) + parseFloat(getComputedStyle(parent).paddingRight);
    const maxW = parent.clientWidth - paddingH;
    let size = 18;
    while (el.scrollWidth > maxW && size > 8) {
      size -= 0.5;
      el.style.fontSize = size + 'px';
    }
  });
}

// Run after render and on resize
const _origRenderStats = renderStats;
renderStats = function() { _origRenderStats.apply(this, arguments); requestAnimationFrame(fitStatValues); };
window.addEventListener('resize', fitStatValues);

function updateStickyTheadTop() {
  const panel = document.querySelector('.sticky-panel');

  document.documentElement.style.setProperty('--sticky-panel-height', offset);

window.addEventListener('resize', updateStickyTheadTop);

populateFilters();
// Pre-seed reached milestones so initial render doesn't trigger achievement flashes
{

render();
// Use ResizeObserver so thead top updates whenever the sticky panel height changes
(function() {
  const panel = document.querySelector('.sticky-panel');
  if (!panel) return;
  // Set immediately after render
  requestAnimationFrame(() => requestAnimationFrame(updateStickyTheadTop));
  // Keep in sync if panel resizes (milestone text, filters, etc.)
  if (window.ResizeObserver) {
    new ResizeObserver(updateStickyTheadTop).observe(panel);
  }
})();

<script>
function openTrailer(filename, gameTitle) {
  const overlay  = document.getElementById('trailerOverlay');
  const video    = document.getElementById('trailerVideo');
  const errEl    = document.getElementById('trailerError');
  const logoEl   = document.getElementById('trailerClearLogo');

  const src = filename.includes('/')
    ? BASE + filename.split('/').map(encodeURIComponent).join('/')
    : TRAILER_BASE_URL + encodeURIComponent(filename);
  errEl.style.display  = 'none';
  video.style.display  = 'block';
  video.src = src;

  // Show clear logo overlay using the exact game title for manifest lookup
  if (gameTitle) {
    logoEl.style.display = 'block';
    logoEl.alt = gameTitle + ' logo';
    logoEl.onerror = () => { logoEl.style.display = 'none'; };
    logoEl.src = imgUrl('clearlogos', gameTitle);
  } else {
    logoEl.style.display = 'none';
  }

  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Detect missing file
  video.onerror = () => showTrailerError();
  video.load();
}

function showTrailerError() {
  const video = document.getElementById('trailerVideo');
  const errEl = document.getElementById('trailerError');
  video.style.display = 'none';
  errEl.style.display = 'block';
}

function closeTrailer() {
  const overlay = document.getElementById('trailerOverlay');
  const video   = document.getElementById('trailerVideo');
  const logoEl  = document.getElementById('trailerClearLogo');
  video.pause();
  video.src = '';
  logoEl.src = '';
  logoEl.style.display = 'none';
  overlay.style.display = 'none';
  document.body.style.overflow = '';
}

// Close on backdrop click or Escape
document.getElementById('trailerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('trailerOverlay')) closeTrailer();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('trailerOverlay').style.display === 'flex') closeTrailer();
});
</script>


<!-- Image Lightbox -->
<div id="imageLightbox">
  <button class="lb-close-btn" onclick="closeLightbox()" title="Close (Esc)">
    <svg width="20" height="20" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">

  <div class="lb-stage">

    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="">
    </div>

    <!-- Right arrow -->
    <button class="lb-arrow" onclick="lbNav(1)" title="Next (→)">
      <svg width="28" height="28" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
        <rect x="4"  y="0"  width="2" height="2" fill="white"/>

        <rect x="4"  y="12" width="2" height="2" fill="white"/>
        <rect x="2"  y="0"  width="2" height="14" fill="white" opacity="0.25"/>
      </svg>
    </button>
  </div>

  <div class="lb-footer">
    <div id="lbLabel"></div>
    <div id="lbDots"></div>
    <div id="lbCounter"></div>
  </div>
</div>


<script>
